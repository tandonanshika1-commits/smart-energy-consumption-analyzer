{% extends "base.html" %}
{% block content %}

<div class="auth-container">
    <div class="auth-card glass-card">

        <h2>🔐 Login</h2>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div style="background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 10px; border-radius: 8px; margin-bottom: 16px; text-align: center; border: 1px solid rgba(239, 68, 68, 0.2);">
                {{ messages[0] }}
            </div>
        {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>

            <button class="primary-btn" type="submit">Login to Dashboard</button>
        </form>

        <p style="text-align:center; font-size:14px; margin-top:20px; color: var(--text-secondary);">
            Don't have an account?
            <a href="/register">Register here</a>
        </p>

    </div>
</div>

{% endblock %}
